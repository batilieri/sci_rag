name: nexiry-rag-api

x-app-env: &app-env
  APP_ENV: ${APP_ENV:-production}
  APP_LOG_LEVEL: ${APP_LOG_LEVEL:-INFO}
  NEXIRY_API_KEY: ${NEXIRY_API_KEY:-}
  WEBHOOK_SECRET: ${WEBHOOK_SECRET:-change-me-32bytes-min}
  WEBHOOK_NEXIRY_URL: ${WEBHOOK_NEXIRY_URL:-}
  POSTGRES_HOST: postgres
  POSTGRES_PORT: 5432
  POSTGRES_DB: ${POSTGRES_DB:-rag}
  POSTGRES_USER: ${POSTGRES_USER:-rag}
  POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
  REDIS_HOST: redis
  REDIS_PORT: 6379
  QDRANT_HOST: qdrant
  QDRANT_PORT: 6333
  QDRANT_GRPC_PORT: 6334
  QDRANT_API_KEY: ${QDRANT_API_KEY:-change-me}
  QDRANT_COLLECTION: ${QDRANT_COLLECTION:-sci_faq_ecd_ecf}
  R2_ACCOUNT_ID: ${R2_ACCOUNT_ID:-}
  R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID:-}
  R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY:-}
  R2_BUCKET: ${R2_BUCKET:-rag-images}
  R2_PUBLIC_BASE_URL: ${R2_PUBLIC_BASE_URL:-}
  R2_PRESIGNED_URL_TTL_SECONDS: ${R2_PRESIGNED_URL_TTL_SECONDS:-3600}
  MINIO_ENDPOINT: http://minio:9000
  MINIO_USER: ${MINIO_USER:-minio}
  MINIO_PASS: ${MINIO_PASS:-minio12345}
  MINIO_BUCKET: ${MINIO_BUCKET:-rag-images-dev}
  ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
  ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-claude-sonnet-4-5-20250929}
  DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
  DEEPSEEK_MODEL: ${DEEPSEEK_MODEL:-deepseek-chat}
  DEEPSEEK_BASE_URL: ${DEEPSEEK_BASE_URL:-https://api.deepseek.com/v1}
  EMBEDDING_MODEL: ${EMBEDDING_MODEL:-BAAI/bge-m3}
  EMBEDDING_DEVICE: ${EMBEDDING_DEVICE:-cpu}
  RERANKER_MODEL: ${RERANKER_MODEL:-BAAI/bge-reranker-v2-m3}
  CELERY_BROKER_URL: redis://redis:6379/1
  CELERY_RESULT_BACKEND: redis://redis:6379/2

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: nexiry-rag-api:latest
    environment: *app-env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - ./data:/srv/app/data
      - ./app:/srv/app/app:ro
      - models_cache:/home/app/.cache
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/v1/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    image: nexiry-rag-api:latest
    environment: *app-env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started
    volumes:
      - ./data:/srv/app/data
      - ./app:/srv/app/app:ro
      - models_cache:/home/app/.cache
    restart: unless-stopped
    command:
      - celery
      - -A
      - app.tasks.celery_app
      - worker
      - -Q
      - ingestion,webhooks
      - --loglevel=info
      - --concurrency=2
    healthcheck:
      test: ["CMD-SHELL", "celery -A app.tasks.celery_app inspect ping -d celery@$$HOSTNAME | grep -q OK"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-rag}
      POSTGRES_USER: ${POSTGRES_USER:-rag}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    command:
      - redis-server
      - --maxmemory
      - 1gb
      - --maxmemory-policy
      - allkeys-lru
      - --save
      - ""
      - --appendonly
      - "no"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  qdrant:
    image: qdrant/qdrant:v1.12.0
    environment:
      QDRANT__SERVICE__API_KEY: ${QDRANT_API_KEY:-change-me}
      QDRANT__SERVICE__HTTP_PORT: 6333
      QDRANT__SERVICE__GRPC_PORT: 6334
    volumes:
      - qdrant_storage:/qdrant/storage
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      - api
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./ops/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ops/certs:/etc/nginx/certs:ro
    restart: unless-stopped

  minio:
    image: minio/minio:RELEASE.2024-10-13T13-34-11Z
    profiles: ["local-storage"]
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_USER:-minio}
      MINIO_ROOT_PASSWORD: ${MINIO_PASS:-minio12345}
    volumes:
      - minio_data:/data
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.55.0
    profiles: ["monitoring"]
    volumes:
      - ./ops/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "127.0.0.1:9090:9090"
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.3.0
    profiles: ["monitoring"]
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./ops/grafana:/etc/grafana/provisioning/dashboards:ro
    ports:
      - "127.0.0.1:3000:3000"
    restart: unless-stopped
    depends_on:
      - prometheus

volumes:
  postgres_data:
  redis_data:
  qdrant_storage:
  minio_data:
  prometheus_data:
  grafana_data:
  models_cache:
