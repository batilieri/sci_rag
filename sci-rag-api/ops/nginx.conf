worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format json escape=json
        '{"time":"$time_iso8601","remote_addr":"$remote_addr","method":"$request_method",'
        '"uri":"$request_uri","status":$status,"request_time":$request_time,'
        '"api_key_prefix":"$http_x_api_key"}';
    access_log /var/log/nginx/access.log json;
    error_log /var/log/nginx/error.log warn;

    upstream rag_api {
        server api:8000;
        keepalive 32;
    }

    limit_req_zone $http_x_api_key zone=per_key:10m rate=100r/m;
    limit_req_status 429;

    server {
        listen 80;
        server_name _;

        client_max_body_size 50M;

        location / {
            limit_req zone=per_key burst=30 nodelay;
            proxy_pass http://rag_api;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
            proxy_buffering off;
            proxy_read_timeout 180s;
            proxy_send_timeout 180s;
        }
    }

    # Production TLS can be enabled by replacing the HTTP server above with a
    # 443 ssl/http2 server using certs mounted at /etc/nginx/certs.
}
