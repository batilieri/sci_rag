<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>SCI RAG — Ingestão de PDF</title>
<style>
  :root { --bg:#0f172a; --panel:#1e293b; --panel2:#273449; --text:#e2e8f0; --muted:#94a3b8;
          --accent:#38bdf8; --ok:#22c55e; --warn:#f59e0b; --err:#ef4444; }
  * { box-sizing: border-box; }
  body { margin:0; font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif; background:var(--bg);
         color:var(--text); min-height:100vh; display:flex; flex-direction:column; align-items:center; }
  header { width:100%; padding:14px 20px; background:var(--panel); border-bottom:1px solid #00000040; }
  header h1 { font-size:16px; margin:0; color:var(--accent); }
  header a { color:var(--muted); font-size:12px; text-decoration:none; margin-left:14px; }
  main { width:100%; max-width:720px; padding:24px; }
  .card { background:var(--panel); border-radius:12px; padding:20px; margin-bottom:18px; }
  label { display:block; font-size:12px; color:var(--muted); margin-bottom:6px; }
  input[type=text], input[type=password] {
    width:100%; background:var(--panel2); border:1px solid #00000040; color:var(--text);
    padding:10px 12px; border-radius:8px; font-size:13px; }
  .drop { border:2px dashed #475569; border-radius:10px; padding:34px; text-align:center; color:var(--muted);
          cursor:pointer; transition:.15s; }
  .drop.hover { border-color:var(--accent); color:var(--text); background:#0ea5e910; }
  button { background:var(--accent); color:#04293a; border:none; padding:11px 22px; border-radius:9px;
           font-weight:700; cursor:pointer; font-size:14px; margin-top:14px; }
  button:disabled { opacity:.5; cursor:not-allowed; }
  .bar { height:10px; background:var(--panel2); border-radius:6px; overflow:hidden; margin:10px 0; }
  .bar > div { height:100%; background:var(--accent); width:0%; transition:width .4s; }
  .log { font-size:13px; line-height:1.6; }
  .pill { display:inline-block; background:#00000030; padding:2px 9px; border-radius:10px; margin:2px 4px 2px 0; font-size:12px; }
  .pill.ok{color:var(--ok)} .pill.warn{color:var(--warn)} .pill.err{color:var(--err)}
  .muted { color:var(--muted); font-size:12px; }
</style>
</head>
<body>
  <header>
    <h1>📥 SCI RAG — Ingestão de PDF → conhecimento
      <a href="/ensinar">🧠 ensinar a IA (chat)</a>
      <a href="/chat">← voltar ao chat</a>
    </h1>
  </header>
  <main>
    <div class="card">
      <label>API key (precisa do escopo <b>admin:write</b>)</label>
      <input type="password" id="apikey" placeholder="rag_live_..." />
    </div>

    <div class="card">
      <label>PDF para transformar em conhecimento (até 50MB)</label>
      <div class="drop" id="drop">
        <div id="droptext">Arraste o PDF aqui, ou clique para escolher</div>
      </div>
      <input type="file" id="file" accept="application/pdf" style="display:none" />
      <button id="send" disabled>Enviar para a IA processar</button>
      <p class="muted">A IA (Claude) extrai o texto, lê as imagens (OCR + descrição) e indexa tudo na base vetorial. PDFs grandes levam alguns minutos.</p>
    </div>

    <div class="card" id="status" style="display:none">
      <div class="log" id="phase">Enviando…</div>
      <div class="bar"><div id="progress"></div></div>
      <div id="summary"></div>
    </div>
  </main>

<script>
const API = location.origin;
const apikeyEl = document.getElementById('apikey');
const drop = document.getElementById('drop');
const droptext = document.getElementById('droptext');
const fileEl = document.getElementById('file');
const sendBtn = document.getElementById('send');
const statusCard = document.getElementById('status');
const phaseEl = document.getElementById('phase');
const progressEl = document.getElementById('progress');
const summaryEl = document.getElementById('summary');

apikeyEl.value = localStorage.getItem('sci_admin_key') || localStorage.getItem('sci_apikey') || '';
apikeyEl.onchange = () => localStorage.setItem('sci_admin_key', apikeyEl.value.trim());

let chosen = null;
function pick(f) {
  if (!f) return;
  if (f.type !== 'application/pdf') { alert('Envie um arquivo .pdf'); return; }
  chosen = f; droptext.textContent = '📄 ' + f.name + ' (' + (f.size/1048576).toFixed(1) + ' MB)';
  sendBtn.disabled = false;
}
drop.onclick = () => fileEl.click();
fileEl.onchange = () => pick(fileEl.files[0]);
drop.ondragover = e => { e.preventDefault(); drop.classList.add('hover'); };
drop.ondragleave = () => drop.classList.remove('hover');
drop.ondrop = e => { e.preventDefault(); drop.classList.remove('hover'); pick(e.dataTransfer.files[0]); };

sendBtn.onclick = async () => {
  const key = apikeyEl.value.trim();
  if (!key) { alert('Informe a API key (admin:write).'); return; }
  if (!chosen) return;
  localStorage.setItem('sci_admin_key', key);
  sendBtn.disabled = true;
  statusCard.style.display = 'block';
  phaseEl.textContent = 'Enviando arquivo…';
  progressEl.style.width = '3%';
  summaryEl.innerHTML = '';

  const fd = new FormData();
  fd.append('file', chosen, chosen.name);
  let job;
  try {
    const r = await fetch(API + '/v1/admin/ingest', { method:'POST', headers:{ 'X-API-Key': key }, body: fd });
    job = await r.json();
    if (!r.ok) { phaseEl.innerHTML = '<span class="pill err">erro '+r.status+'</span> '+(job.mensagem||job.erro||JSON.stringify(job)); sendBtn.disabled=false; return; }
  } catch (e) { phaseEl.textContent = 'Falha de rede: '+e.message; sendBtn.disabled=false; return; }

  phaseEl.innerHTML = 'Job <b>'+job.job_id+'</b> na fila. Processando…';
  poll(job.job_id, key);
};

async function poll(jobId, key) {
  try {
    const r = await fetch(API + '/v1/admin/ingest/' + jobId, { headers:{ 'X-API-Key': key } });
    const j = await r.json();
    const pct = (j.progress && j.progress.progresso_pct) || 0;
    progressEl.style.width = Math.max(3, pct) + '%';
    phaseEl.innerHTML = 'Status: <b>'+j.status+'</b> · fase: '+(j.progress?j.progress.phase:'-')+' · '+pct.toFixed(0)+'%';
    const s = j.summary || {};
    summaryEl.innerHTML =
      '<span class="pill">FAQs detectados: '+(s.faqs_detectados??0)+'</span>'+
      '<span class="pill ok">FAQs indexados: '+(s.faqs_ingeridos??0)+'</span>'+
      '<span class="pill">imagens: '+(s.imagens_upadas??0)+'</span>'+
      '<span class="pill">chunks: '+(s.chunks_upsertados??0)+'</span>'+
      ((j.errors&&j.errors.length)?'<span class="pill err">erros: '+j.errors.length+'</span>':'');
    if (['completed','failed','partial'].includes(j.status)) {
      const tag = j.status==='completed'?'ok':(j.status==='partial'?'warn':'err');
      phaseEl.innerHTML = '<span class="pill '+tag+'">'+j.status.toUpperCase()+'</span> Concluído. O conhecimento já está na base — teste no <a href="/chat" style="color:var(--accent)">chat</a>.';
      sendBtn.disabled = false;
      return;
    }
    setTimeout(() => poll(jobId, key), 2500);
  } catch (e) {
    phaseEl.textContent = 'Erro ao consultar status: ' + e.message;
    setTimeout(() => poll(jobId, key), 4000);
  }
}
</script>
</body>
</html>
